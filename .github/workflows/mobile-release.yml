name: Mobile Release Artifacts

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing or new release tag to attach mobile artifacts to
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: mobile-release-${{ github.event.release.tag_name || inputs.tag || github.sha }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  prepare-release:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compute release tag
        id: tag
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")

          if [ "${{ github.event_name }}" = "release" ]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          elif [ -n "${{ inputs.tag }}" ]; then
            RELEASE_TAG="${{ inputs.tag }}"
          else
            RELEASE_TAG="v${APP_VERSION}-build.${{ github.run_number }}"
          fi

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create tag if needed
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.release_tag }}
        run: |
          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists"
          else
            git tag "${RELEASE_TAG}" "${GITHUB_SHA}"
            git push origin "${RELEASE_TAG}"
          fi

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: prepare-release
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Android native project
        run: npx expo prebuild --platform android --non-interactive

      - name: Build Android release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Prepare Android artifact
        run: |
          mkdir -p release-assets
          cp android/app/build/outputs/apk/release/app-release.apk "release-assets/grabvocab-android-${RELEASE_TAG}.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-asset
          path: release-assets/grabvocab-android-*.apk

  build-ios:
    name: Build iOS Simulator App
    runs-on: macos-26
    needs: prepare-release
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate iOS native project
        run: npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build iOS simulator app
        run: |
          APP_NAME=$(node -p "require('./app.json').expo.name.replace(/[^a-zA-Z0-9]/g, '')")
          xcodebuild \
            -workspace "ios/${APP_NAME}.xcworkspace" \
            -scheme "${APP_NAME}" \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO

      - name: Package iOS artifact
        run: |
          mkdir -p release-assets
          APP_PATH=$(find ios/build/Build/Products/Release-iphonesimulator -maxdepth 1 -name '*.app' | head -n 1)
          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "release-assets/grabvocab-ios-simulator-${RELEASE_TAG}.zip"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-asset
          path: release-assets/grabvocab-ios-simulator-*.zip

  attach-to-release:
    name: Attach Assets To Release
    runs-on: ubuntu-latest
    needs: [prepare-release, build-android, build-ios]
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release-asset
          path: release-assets

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-release-asset
          path: release-assets

      - name: Create release if needed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes "Automated mobile build artifacts."
          fi

      - name: Upload assets to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${RELEASE_TAG}" release-assets/* --clobber
