name: Mobile Release Artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing or new release tag to attach mobile artifacts to
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: mobile-release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Android native project
        run: npx expo prebuild --platform android --non-interactive

      - name: Build Android debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Prepare Android artifact
        run: |
          mkdir -p release-assets
          cp android/app/build/outputs/apk/debug/app-debug.apk "release-assets/grabvocab-android-debug-${RELEASE_TAG}.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-asset
          path: release-assets/grabvocab-android-debug-*.apk

  build-ios:
    name: Build iOS Simulator App
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate iOS native project
        run: npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build iOS simulator app
        run: |
          APP_NAME=$(node -p "require('./app.json').expo.name.replace(/[^a-zA-Z0-9]/g, '')")
          xcodebuild \
            -workspace "ios/${APP_NAME}.xcworkspace" \
            -scheme "${APP_NAME}" \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO

      - name: Package iOS artifact
        run: |
          mkdir -p release-assets
          APP_PATH=$(find ios/build/Build/Products/Release-iphonesimulator -maxdepth 1 -name '*.app' | head -n 1)
          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "release-assets/grabvocab-ios-simulator-${RELEASE_TAG}.zip"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-asset
          path: release-assets/grabvocab-ios-simulator-*.zip

  attach-to-release:
    name: Attach Assets To Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release-asset
          path: release-assets

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-release-asset
          path: release-assets

      - name: Create release if needed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes "Automated mobile build artifacts."
          fi

      - name: Upload assets to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${RELEASE_TAG}" release-assets/* --clobber
